<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Glow & Bloom Skin Wellness Center</title>
    <style>
        :root {
            --primary-pink: #FFB7B2;
            --light-pink: #FFE5E5;
            --dark-pink: #E0908A;
            --rose-gold: #B76E79;
            --charcoal: #333333;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #FFF9F9;
            color: var(--charcoal);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--light-pink);
            border-bottom: 2px solid var(--primary-pink);
            text-align: center;
            padding: 2rem 1rem;
        }

        header h1 {
            color: var(--rose-gold);
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin-bottom: 0.3rem;
        }

        header p {
            color: var(--dark-pink);
            font-style: italic;
            font-size: 1rem;
        }

        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .login-card {
            background: var(--white);
            border-radius: 15px;
            padding: 2.5rem 2rem;
            box-shadow: 0 10px 20px rgba(255, 183, 178, 0.2);
            border: 1px solid var(--light-pink);
            width: 100%;
            max-width: 420px;
        }

        h2 {
            color: var(--rose-gold);
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
            border-bottom: 2px solid var(--light-pink);
            padding-bottom: 0.5rem;
            text-align: center;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--rose-gold);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--primary-pink);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--rose-gold);
            box-shadow: 0 0 5px rgba(183, 110, 121, 0.3);
        }

        /* Password Wrapper for Toggle Feature */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--dark-pink);
            font-size: 0.85rem;
            user-select: none;
            font-weight: 600;
        }

        .toggle-password:hover {
            color: var(--rose-gold);
        }

        /* Helper Options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--charcoal);
            cursor: pointer;
        }

        .remember-me input {
            width: auto;
            cursor: pointer;
            accent-color: var(--rose-gold);
        }

        .forgot-pass {
            color: var(--dark-pink);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-pass:hover {
            color: var(--rose-gold);
            text-decoration: underline;
        }

        button {
            width: 100%;
            background-color: var(--rose-gold);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: var(--dark-pink);
        }

        /* Footer links */
        .login-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }

        .login-footer a {
            color: var(--rose-gold);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }

        .login-footer a:hover {
            color: var(--dark-pink);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>Glow & Bloom</h1>
        <p>Skin Wellness Center • Radiance Awaits You</p>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            
            <form id="loginForm" onsubmit="handleLoginSubmit(event)">
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <span class="toggle-password" onclick="togglePasswordVisibility()">Show</span>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-pass" onclick="alert('Password reset link sent to your email! ✨')">Forgot Password?</a>
                </div>

                <button type="submit">Sign In to My Account</button>
            </form>

            <div class="login-footer">
                Don't have an account yet? <a href="#" onclick="alert('Redirecting to Registration Page... ✨')">Create Account</a>
            </div>
        </div>
    </div>

 <script>
    // Password Visibility Toggle Logic
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const toggleText = document.querySelector('.toggle-password');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleText.innerText = 'Hide';
        } else {
            passwordInput.type = 'password';
            toggleText.innerText = 'Show';
        }
    }

    // Submission Logic to redirect to the Dashboard
    function handleLoginSubmit(event) {
    event.preventDefault();
    
    const email = document.getElementById('email').value;
    alert(`✨ Welcome back!\nLogged in successfully as: ${email}`);
    
    // DAPAT GANITO ANG NAKASULAT (maliit lahat ng titik):
    window.location.href = "dashboard.html"; 
}
</script>
